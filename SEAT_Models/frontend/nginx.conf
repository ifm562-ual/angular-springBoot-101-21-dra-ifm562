server {
  listen 80;

  location / {
    root /usr/share/nginx/html;
    index index.html;
    try_files $uri $uri/ /index.html;  # necesario para Angular routing
  }

  location /api/ {
    proxy_pass http://backend:8080;    # redirige al servicio backend de Docker
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }
}