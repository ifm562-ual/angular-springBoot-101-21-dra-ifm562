<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sample Table for Scraping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
        }
        table.infobox {
            border-collapse: collapse;
            width: 60%;
            margin: 20px auto;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
        }
        th, td {
            border: 1px solid #eee;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #3b82f6;
            color: white;
        }
        caption {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 10px;
            color: #1e293b;
        }
        img {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 50%;
        }
        a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<h2 style="text-align:center;">SEAT Models Registry</h2>

<table class="infobox">
    <caption>Modelos</caption>
    <thead>
        <tr>
            <th>Image</th>
            <th>Name</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td><img src="https://picsum.photos/seed/seat1/100" alt="SEAT Ibiza"></td>
            <td><a href="/wiki/SEAT_Ibiza">SEAT Ibiza</a></td>
        </tr>
        <tr>
            <td><img src="https://picsum.photos/seed/seat2/100" alt="SEAT Leon"></td>
            <td><a href="/wiki/SEAT_Leon">SEAT Leon</a></td>
        </tr>
        <tr>
            <td><img src="https://picsum.photos/seed/seat3/100" alt="SEAT Ateca"></td>
            <td><a href="/wiki/SEAT_Ateca">SEAT Ateca</a></td>
        </tr>
        <tr>
            <td><img src="https://picsum.photos/seed/seat4/100" alt="SEAT Arona"></td>
            <td><a href="/wiki/SEAT_Arona">SEAT Arona</a></td>
        </tr>
        <tr>
            <td><img src="https://picsum.photos/seed/seat5/100" alt="SEAT Tarraco"></td>
            <td><a href="/wiki/SEAT_Tarraco">SEAT Tarraco</a></td>
        </tr>
    </tbody>
</table>

</body>
</html>
